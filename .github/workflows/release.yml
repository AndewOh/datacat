name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  CARGO_TERM_COLOR: always

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - collector
          - ingester
          - query
          - api
          - alerting
          - insights
          - admin
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build & Push — web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-and-push, build-web]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Update Chart.yaml appVersion
        run: |
          # Strip leading 'v' from tag for appVersion (e.g. v0.1.0 -> 0.1.0)
          APP_VERSION="${{ github.ref_name }}"
          APP_VERSION="${APP_VERSION#v}"
          sed -i "s/^appVersion:.*$/appVersion: \"${APP_VERSION}\"/" deploy/helm/datacat/Chart.yaml
          sed -i "s/^version:.*$/version: ${APP_VERSION}/" deploy/helm/datacat/Chart.yaml

      - name: Package Helm chart
        run: helm package deploy/helm/datacat

      - name: Push Helm chart as OCI artifact
        run: |
          helm push datacat-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts

      - name: Upload chart tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: datacat-*.tgz
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-helm
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Generate release notes from git log
        id: release-notes
        run: |
          # Find the previous tag to generate a changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi

          echo "## Changes in ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "${PREV_TAG}" ]; then
            echo "**Full diff:** [\`${PREV_TAG}...${{ github.ref_name }}\`](../../compare/${PREV_TAG}...${{ github.ref_name }})" >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "### Commits" >> release_notes.md
          git log ${RANGE} --pretty=format:"- %s (%h)" >> release_notes.md
          echo "" >> release_notes.md

          echo "### Docker Images" >> release_notes.md
          for svc in collector ingester query api alerting insights admin web; do
            echo "- \`ghcr.io/${{ github.repository }}/${svc}:${{ github.ref_name }}\`" >> release_notes.md
          done
          echo "" >> release_notes.md

          echo "### Helm Chart" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "helm upgrade --install datacat oci://ghcr.io/${{ github.repository }}/charts/datacat --version ${{ github.ref_name }}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "datacat ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            datacat-*.tgz
