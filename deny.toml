[licenses]
# 허용 라이선스 목록
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "AGPL-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]

# 명시적 거부 라이선스
deny = [
    "GPL-2.0",
    "LGPL-2.0",
    "LGPL-2.1",
]

# 라이선스 미확인 crate 처리
unlicensed = "deny"

# copyleft 라이선스 정책
copyleft = "warn"

# 라이선스 예외: 특정 crate는 수동으로 허용
exceptions = [
    # rdkafka는 MIT + BSD 라이선스
    { allow = ["MIT"], name = "rdkafka" },
    { allow = ["MIT"], name = "rdkafka-sys" },
]

[bans]
# 동일 crate의 여러 버전을 경고로 처리
multiple-versions = "warn"

# 특정 crate 사용 금지 (보안/라이선스 이슈)
deny = []

# workspace 내 중복 의존성 허용 목록
skip = []

[advisories]
# 알려진 취약점이 있는 crate 금지
vulnerability = "deny"

# 유지보수가 중단된 crate 경고
unmaintained = "warn"

# yanked 버전 사용 금지
yanked = "deny"

# 보안 공지 무시 목록 (사유와 함께 명시)
ignore = []

[sources]
# crates.io 외 소스 허용 정책
unknown-registry = "deny"
unknown-git = "warn"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
