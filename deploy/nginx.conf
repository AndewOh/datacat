server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the datacat-api gateway.
    # In Docker Compose, "datacat-api" resolves via the internal DNS.
    # Override this via an nginx template or env-substitution for other
    # deployment targets (Kubernetes uses the Ingress for routing instead).
    location /api/ {
        proxy_pass http://datacat-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
