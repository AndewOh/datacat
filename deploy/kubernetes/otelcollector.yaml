# =============================================================================
# datacat OTel Collector 게이트웨이 (Kubernetes)
# =============================================================================
# 클러스터 내 모든 OTel 데이터를 수집하여 datacat collector로 포워딩합니다.
#
# 역할:
#   - pod의 OTel SDK → 이 Collector → datacat collector (DATACAT_HOST_PLACEHOLDER)
#   - 배치 처리, 재시도, 메모리 제한 적용
#   - 클러스터 메타데이터(k8s.pod.name, k8s.namespace 등) 자동 주입
# =============================================================================
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: datacat-collector
  namespace: datacat
spec:
  mode: deployment   # deployment | daemonset | sidecar | statefulset
  replicas: 2

  serviceAccount: datacat-otel-collector

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # 배치: 네트워크 효율 향상
      batch:
        timeout: 1s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # 메모리 제한: OOM 방지
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100

      # Kubernetes 메타데이터 자동 주입
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app.version
              key: app.kubernetes.io/version
              from: pod
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
            - from: connection

      # 리소스 속성 추가
      resource:
        attributes:
          - key: cluster.name
            value: "${K8S_CLUSTER_NAME}"
            action: upsert

    exporters:
      # datacat collector로 포워딩
      otlp/datacat:
        endpoint: DATACAT_HOST_PLACEHOLDER
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000

      # 디버그 (개발 환경에서만 활성화)
      # debug:
      #   verbosity: detailed

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/datacat]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/datacat]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/datacat]

      telemetry:
        logs:
          level: warn

  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 500Mi

---
# Collector가 Pod 메타데이터를 읽을 수 있도록 RBAC 설정
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datacat-otel-collector
  namespace: datacat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datacat-otel-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datacat-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datacat-otel-collector
subjects:
  - kind: ServiceAccount
    name: datacat-otel-collector
    namespace: datacat
