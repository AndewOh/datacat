{{- if .Values.clickhouse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "datacat.fullname" . }}-clickhouse
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  replicas: 1
  serviceName: {{ include "datacat.fullname" . }}-clickhouse-headless
  selector:
    matchLabels:
      {{- include "datacat.selectorLabels" (dict "root" . "component" "clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datacat.selectorLabels" (dict "root" . "component" "clickhouse") | nindent 8 }}
    spec:
      initContainers:
        # Copy init.sql into the Docker entrypoint directory so ClickHouse
        # executes it on first startup to create the datacat schema.
        - name: init-sql
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /init-scripts/init.sql /docker-entrypoint-initdb.d/init.sql
          volumeMounts:
            - name: init-scripts
              mountPath: /init-scripts
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          env:
            - name: CLICKHOUSE_DB
              value: datacat
            - name: CLICKHOUSE_USER
              value: datacat
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datacat.fullname" . }}-clickhouse-secret
                  key: password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/datacat.xml
              subPath: datacat.xml
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "datacat.fullname" . }}-clickhouse-config
        - name: init-scripts
          configMap:
            name: {{ include "datacat.fullname" . }}-clickhouse-init
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
{{- end }}
