{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datacat.fullname" . }}-clickhouse-secret
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
type: Opaque
stringData:
  # Override via --set or a sealed-secrets / external-secrets workflow in production.
  password: "datacat_prod"
{{- end }}
