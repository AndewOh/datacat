apiVersion: v1
kind: Service
metadata:
  name: {{ include "datacat.fullname" . }}-api
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "datacat.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
