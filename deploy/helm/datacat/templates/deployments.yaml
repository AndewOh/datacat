      containers:
        - name: admin
          image: {{ include "datacat.image" (dict "root" . "image" .Values.admin.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9092
              protocol: TCP
          env:
            - name: DATACAT_LISTEN_ADDR
              value: "0.0.0.0:9092"
