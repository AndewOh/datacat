              valueFrom:
                secretKeyRef:
                  name: {{ include "datacat.fullname" . }}-admin-secret
                  key: license-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
