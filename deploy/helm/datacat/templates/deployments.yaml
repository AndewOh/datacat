      port: 9092
      targetPort: http
      protocol: TCP
---
# Secret for datacat-admin license key — override in production.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datacat.fullname" . }}-admin-secret
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
type: Opaque
stringData:
  license-secret: "change_me_in_production"
---
