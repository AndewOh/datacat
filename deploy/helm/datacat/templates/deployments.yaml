{{/* -----------------------------------------------------------------------
     datacat-admin  — Tenant admin, port 9092
----------------------------------------------------------------------- */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datacat.fullname" . }}-admin
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      {{- include "datacat.selectorLabels" (dict "root" . "component" "admin") | nindent 6 }}
