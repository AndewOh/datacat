{{/* -----------------------------------------------------------------------
     datacat-collector  — OTLP ingest, gRPC 4317 + HTTP 4318
----------------------------------------------------------------------- */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datacat.fullname" . }}-collector
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      {{- include "datacat.selectorLabels" (dict "root" . "component" "collector") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datacat.selectorLabels" (dict "root" . "component" "collector") | nindent 8 }}
    spec:
      containers:
        - name: collector
          image: {{ include "datacat.image" (dict "root" . "image" .Values.collector.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: DATACAT_KAFKA_BROKERS
              value: "{{ include "datacat.fullname" . }}-redpanda:29092"
            - name: DATACAT_ENV
              value: {{ .Values.global.env | quote }}
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datacat.fullname" . }}-collector
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  type: ClusterIP
  selector:
    {{- include "datacat.selectorLabels" (dict "root" . "component" "collector") | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
---
{{/* -----------------------------------------------------------------------
     datacat-ingester  — Kafka → ClickHouse writer
----------------------------------------------------------------------- */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datacat.fullname" . }}-ingester
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingester
spec:
  replicas: {{ .Values.ingester.replicas }}
  selector:
    matchLabels:
      {{- include "datacat.selectorLabels" (dict "root" . "component" "ingester") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datacat.selectorLabels" (dict "root" . "component" "ingester") | nindent 8 }}
    spec:
      containers:
        - name: ingester
          image: {{ include "datacat.image" (dict "root" . "image" .Values.ingester.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: DATACAT_KAFKA_BROKERS
              value: "{{ include "datacat.fullname" . }}-redpanda:29092"
            - name: DATACAT_CLICKHOUSE_URL
              value: "http://{{ include "datacat.fullname" . }}-clickhouse:8123"
            - name: DATACAT_CLICKHOUSE_USER
              value: datacat
            - name: DATACAT_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datacat.fullname" . }}-clickhouse-secret
                  key: password
            - name: DATACAT_ENV
              value: {{ .Values.global.env | quote }}
---
{{/* -----------------------------------------------------------------------
     datacat-query  — ClickHouse query service, port 8001
----------------------------------------------------------------------- */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datacat.fullname" . }}-query
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  replicas: {{ .Values.query.replicas }}
  selector:
    matchLabels:
      {{- include "datacat.selectorLabels" (dict "root" . "component" "query") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datacat.selectorLabels" (dict "root" . "component" "query") | nindent 8 }}
    spec:
      containers:
        - name: query
          image: {{ include "datacat.image" (dict "root" . "image" .Values.query.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: DATACAT_LISTEN_ADDR
              value: "0.0.0.0:8001"
            - name: DATACAT_CLICKHOUSE_URL
              value: "http://{{ include "datacat.fullname" . }}-clickhouse:8123"
            - name: DATACAT_CLICKHOUSE_USER
              value: datacat
            - name: DATACAT_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datacat.fullname" . }}-clickhouse-secret
                  key: password
            - name: DATACAT_ENV
              value: {{ .Values.global.env | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datacat.fullname" . }}-query
  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  type: ClusterIP
  selector:
    {{- include "datacat.selectorLabels" (dict "root" . "component" "query") | nindent 4 }}
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP
---
