  labels:
    {{- include "datacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    {{- include "datacat.selectorLabels" (dict "root" . "component" "admin") | nindent 4 }}
